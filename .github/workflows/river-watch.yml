name: River Watch Alerts

permissions:
  contents: read

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-rivers:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore alert cooldown state
        uses: actions/cache@v4
        with:
          path: state.json
          key: river-alert-state-${{ github.run_id }}
          restore-keys: |
            river-alert-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write runtime config
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
        run: |
          printf '%s' "$CONFIG_JSON" > config.json
          {
            echo "TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID"
            echo "TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN"
            echo "TWILIO_WHATSAPP_FROM=$TWILIO_WHATSAPP_FROM"
            echo "META_ACCESS_TOKEN=$META_ACCESS_TOKEN"
            echo "META_PHONE_NUMBER_ID=$META_PHONE_NUMBER_ID"
          } > .env

      - name: Run one river watch cycle
        run: python main.py
